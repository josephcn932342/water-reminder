<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#8bd7f4" />
  <title>喝水提醒相簿</title>
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;padding:22px 14px 60px;font-family:"PingFang TC","Microsoft JhengHei",sans-serif;color:#173e50;background:linear-gradient(150deg,#e9f9ff,#8bd7f4)}
    main{width:min(820px,100%);margin:auto}header{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:18px}h1{margin:0;font-size:27px}.sub{margin:5px 0 0;color:#557481;font-size:13px}.card{padding:18px;border:1px solid #ffffffb8;border-radius:24px;background:#f8fdfff2;box-shadow:0 18px 50px #24566e22}
    input,button,select{font:inherit}input[type=password]{width:100%;height:46px;padding:0 13px;border:1px solid #b7d8e5;border-radius:14px}.login{display:grid;grid-template-columns:1fr auto;gap:8px}button{min-height:42px;padding:8px 14px;border:0;border-radius:13px;color:white;background:#258fbd;font-weight:700;cursor:pointer}.secondary{color:#21647e;background:#e2f4fa}.danger{color:#a13d48;background:#ffe9eb}
    .upload{display:flex;align-items:center;justify-content:space-between;gap:14px;margin:18px 0}.upload input{display:none}.upload label{display:inline-grid;min-height:46px;place-items:center;padding:9px 16px;border-radius:14px;color:white;background:#258fbd;font-weight:700;cursor:pointer}.count{color:#557481;font-size:12px}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px}.photo-card{overflow:hidden;border:1px solid #d2e8f0;border-radius:20px;background:white}.preview{position:relative;height:220px;background:#dceff6}.preview img{width:100%;height:100%;display:block;object-fit:cover}.enabled-badge{position:absolute;top:10px;left:10px;padding:5px 9px;border-radius:99px;color:white;background:#238bb8d9;font-size:11px}.disabled .preview img{filter:grayscale(.8);opacity:.48}.disabled .enabled-badge{background:#61757dcc}.meta{padding:12px}.name{overflow:hidden;margin:0 0 10px;font-size:13px;font-weight:700;text-overflow:ellipsis;white-space:nowrap}.row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:8px}.row label{font-size:12px}.row select{min-width:0;max-width:125px;padding:7px;border:1px solid #cee3eb;border-radius:10px;background:white}.controls{display:grid;grid-template-columns:1fr;gap:6px;margin-top:10px}.controls button{min-height:36px;padding:5px;font-size:12px}.status{min-height:20px;margin:12px 2px;color:#557481;font-size:12px;line-height:1.5}.empty{grid-column:1/-1;padding:42px;text-align:center;color:#6e8994;background:#f8fdffb8;border-radius:20px}@media(max-width:480px){header{align-items:flex-start;flex-direction:column}.upload{align-items:flex-start;flex-direction:column}.grid{grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.preview{height:180px}}
  </style>
</head>
<body>
  <main>
    <header><div><h1>喝水提醒相簿</h1><p class="sub">上傳照片，勾選要出現在提醒中的圖片。</p></div><a href="/" style="color:#21647e">回到提醒</a></header>
    <section class="card">
      <div class="login" id="loginBox"><input id="password" type="password" placeholder="相簿管理密碼" autocomplete="current-password" /><button id="login">登入</button></div>
      <section id="manager" hidden>
        <div class="upload"><label for="files">＋ 選擇照片<input id="files" type="file" accept="image/jpeg,image/png,image/webp" multiple /></label><div style="display:flex;align-items:center;gap:9px"><span class="count" id="count"></span><button id="refresh" class="secondary" type="button">↻ 更新圖庫</button></div></div>
        <div class="grid" id="grid"></div>
      </section>
      <p class="status" id="status"></p>
    </section>
  </main>
  <script>
    const grid=document.querySelector('#grid');const status=document.querySelector('#status');const manager=document.querySelector('#manager');const loginBox=document.querySelector('#loginBox');let password='';let photos=[];
    const positions={'50% 20%':'最上方','50% 35%':'偏上','50% 50%':'置中','50% 65%':'偏下','50% 80%':'最下方','25% 50%':'偏左','75% 50%':'偏右'};
    const auth=()=>({authorization:`Bearer ${password}`});
    const escapeHtml=(value)=>value.replace(/[&<>"']/g,(char)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
    async function api(path,options={}){const response=await fetch(path,{...options,headers:{...auth(),...(options.headers||{})}});const data=await response.json().catch(()=>({message:'伺服器回應錯誤'}));if(!response.ok)throw new Error(data.message||'操作失敗');return data}
    async function loadPhotos(message='正在更新圖庫…'){status.textContent=message;const data=await api('/api/gallery');photos=data.photos;render();status.textContent='圖庫已更新 ✓'}
    function render(){photos.sort((a,b)=>Number(b.enabled)-Number(a.enabled)||b.createdAt.localeCompare(a.createdAt));document.querySelector('#count').textContent=`共 ${photos.length} 張・已顯示 ${photos.filter(p=>p.enabled).length} 張`;grid.innerHTML='';if(!photos.length){grid.innerHTML='<div class="empty">還沒有照片，先從手機選幾張吧 ♡</div>';return}photos.forEach((photo)=>{const card=document.createElement('article');card.className=`photo-card ${photo.enabled?'':'disabled'}`;const options=Object.entries(positions).map(([value,label])=>`<option value="${value}" ${photo.position===value?'selected':''}>${label}</option>`).join('');card.innerHTML=`<div class="preview"><img src="/media/${photo.id}" alt=""><span class="enabled-badge">${photo.enabled?'顯示中':'已隱藏'}</span></div><div class="meta"><p class="name" title="${escapeHtml(photo.name)}">${escapeHtml(photo.name)}</p><div class="row"><label><input class="toggle" type="checkbox" ${photo.enabled?'checked':''}> 顯示</label><select class="position">${options}</select></div><div class="controls"><button class="delete danger">刪除</button></div></div>`;card.querySelector('.toggle').onchange=async(event)=>{await patch(photo.id,{enabled:event.target.checked});photo.enabled=event.target.checked;render()};card.querySelector('.position').onchange=async(event)=>{await patch(photo.id,{position:event.target.value});photo.position=event.target.value;render()};card.querySelector('.delete').onclick=()=>remove(photo);grid.appendChild(card)})}
    async function patch(id,change){status.textContent='儲存中…';await api(`/api/gallery/${id}`,{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify(change)});status.textContent='已儲存 ✓'}
    async function remove(photo){if(!confirm(`確定刪除「${photo.name}」？`))return;await api(`/api/gallery/${photo.id}`,{method:'DELETE'});photos=photos.filter(item=>item.id!==photo.id);render();status.textContent='圖片已刪除'}
    document.querySelector('#login').onclick=async()=>{password=document.querySelector('#password').value;try{await loadPhotos('登入中…');loginBox.hidden=true;manager.hidden=false;status.textContent='已登入'}catch(error){status.textContent=error.message}};
    document.querySelector('#refresh').onclick=async()=>{try{await loadPhotos()}catch(error){status.textContent=error.message}};
    document.querySelector('#files').onchange=async(event)=>{const files=[...event.target.files];if(!files.length)return;for(let i=0;i<files.length;i++){const file=files[i];status.textContent=`上傳中 ${i+1}/${files.length}：${file.name}`;try{const data=await api('/api/gallery/upload',{method:'POST',headers:{'content-type':file.type,'x-file-name':encodeURIComponent(file.name)},body:file});photos.unshift(data.photo);render()}catch(error){status.textContent=`${file.name}：${error.message}`;return}}status.textContent=`已上傳 ${files.length} 張 ✓`;event.target.value=''};
  </script>
</body>
</html>
